<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carolines Tagesplan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F8F5F0;
    --ink: #1C1917;
    --ink-light: #57534E;
    --ink-faint: #A8A29E;
    --border: #E4DDD4;
    --white: #FFFFFF;
    --red: #9B1C1C;
    --red-bg: #FEF2F2;
    --red-dot: #EF4444;
    --amber: #92400E;
    --amber-bg: #FFFBEB;
    --amber-dot: #F59E0B;
    --teal: #134E4A;
    --teal-bg: #F0FDFA;
    --teal-dot: #14B8A6;
    --pink: #831843;
    --pink-bg: #FDF2F8;
    --pink-dot: #EC4899;
    --gray: #44403C;
    --gray-bg: #FAFAF9;
    --gray-dot: #A8A29E;
  }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* HEADER */
  .header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
  }

  .title em {
    font-style: italic;
    font-weight: 400;
  }

  .datetime {
    text-align: right;
  }

  .date-display {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--ink);
    font-weight: 600;
  }

  .time-display {
    font-size: 1.75rem;
    font-weight: 300;
    color: var(--ink-light);
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  .greeting {
    margin-top: 0.75rem;
    font-size: 0.875rem;
    color: var(--ink-faint);
    font-weight: 300;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--ink-light);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SECTIONS */
  .section {
    margin-bottom: 2rem;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-size: 0.7rem;
    color: var(--ink-faint);
    font-weight: 400;
  }

  /* TASK CARDS */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .task-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
    cursor: grab;
    position: relative;
  }

  .task-card:active { cursor: grabbing; }

  .task-card.dragging {
    opacity: 0.5;
    transform: scale(0.98);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .task-card.drag-over {
    border-color: var(--ink-faint);
    box-shadow: 0 0 0 2px var(--ink-faint);
  }

  .task-card.done-card {
    opacity: 0.45;
    background: var(--gray-bg);
  }

  .task-card.done-card .task-text {
    text-decoration: line-through;
    color: var(--ink-faint);
  }

  /* TYPE INDICATOR */
  .type-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }

  /* TASK CONTENT */
  .task-content {
    flex: 1;
    min-width: 0;
  }

  .task-text {
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.5;
    font-weight: 400;
  }

  .task-time {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-weight: 300;
  }

  .task-note {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
    font-style: italic;
  }

  /* BADGES */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }

  /* ACTIONS */
  .task-actions {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
  }

  .btn-done {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    color: var(--ink-faint);
    font-size: 11px;
  }

  .btn-done:hover {
    border-color: var(--teal-dot);
    background: var(--teal-bg);
    color: var(--teal-dot);
  }

  .task-card.done-card .btn-done {
    background: var(--teal-bg);
    border-color: var(--teal-dot);
    color: var(--teal-dot);
  }

  /* DRAG HANDLE */
  .drag-handle {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 5px;
    cursor: grab;
    flex-shrink: 0;
    opacity: 0.3;
    transition: opacity 0.15s;
  }

  .task-card:hover .drag-handle { opacity: 0.7; }

  .drag-handle span {
    display: block;
    width: 14px;
    height: 1.5px;
    background: var(--ink);
    border-radius: 2px;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 2rem;
    color: var(--ink-faint);
    font-size: 13px;
    font-style: italic;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 1rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--teal-dot);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 5px;
    font-weight: 300;
  }

  /* FOOTER */
  .footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
    font-style: italic;
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .app { padding: 1.25rem 1rem 3rem; }
    .title { font-size: 1.5rem; }
    .time-display { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="title">Guten Morgen,<br><em>Caroline.</em></div>
        <div class="greeting" id="greeting"></div>
      </div>
      <div class="datetime">
        <div class="date-display" id="date-display"></div>
        <div class="time-display" id="time-display"></div>
      </div>
    </div>
    <div class="progress-bar" style="margin-top:1.25rem">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 von 0 Aufgaben erledigt</div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#EC4899"></div> Fixer Termin</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div> Dringend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div> Zeitkritisch</div>
    <div class="legend-item"><div class="legend-dot" style="background:#14B8A6"></div> Finanzen</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div> Lernen</div>
    <div class="legend-item"><div class="legend-dot" style="background:#A8A29E"></div> Haushalt / Sonstiges</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div> Social Media</div>
  </div>

  <!-- SECTION 1: FIXTERMINE -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">📅 Fixtermine</div>
      <div class="section-line"></div>
      <div class="section-count" id="count-fixed"></div>
    </div>
    <div class="task-list" id="list-fixed"></div>
  </div>

  <!-- SECTION 2: NOTWENDIGE AUFGABEN -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">✦ Notwendige Aufgaben</div>
      <div class="section-line"></div>
      <div class="section-count" id="count-required"></div>
    </div>
    <div class="task-list" id="list-required"></div>
  </div>

  <!-- SECTION 3: LÜCKENFÜLLER -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">◌ Lückenfüller</div>
      <div class="section-line"></div>
      <div class="section-count" id="count-filler"></div>
    </div>
    <div class="task-list" id="list-filler"></div>
  </div>

  <div class="footer">Aktualisiert von Claude · Tippe "Tagesplan" um die neueste Version zu laden</div>
</div>

<script>
// ============================================================
// WIEDERKEHRENDE SOCIAL MEDIA AUFGABEN (automatisch nach Wochentag)
// 0=So, 1=Mo, 2=Di, 3=Mi, 4=Do, 5=Fr, 6=Sa
// ============================================================
function getSocialMediaTasks() {
  const day = new Date().getDay();
  const tasks = [];

  if (day === 2) tasks.push({
    id: "sm_ig_di", text: "Instagram Post veröffentlichen",
    time: "19:00–20:00 Uhr", note: "Vorausgedacht · Zielgruppe 40–60 & 55–65",
    type: "purple", done: false
  });
  if (day === 3) tasks.push({
    id: "sm_fb_mi", text: "Facebook Post veröffentlichen",
    time: "10:00–11:00 oder 15:00–16:00 Uhr", note: "Vorausgedacht · Zielgruppe 65+",
    type: "purple", done: false
  });
  if (day === 4) tasks.push({
    id: "sm_ig_do", text: "Instagram Post veröffentlichen",
    time: "19:00–20:00 Uhr", note: "Vorausgedacht · Zielgruppe 40–60 & 55–65",
    type: "purple", done: false
  });
  if (day === 6) {
    tasks.push({ id: "sm_fb_sa", text: "Facebook Post veröffentlichen",
      time: "10:00 Uhr", note: "Vorausgedacht · Zielgruppe 65+", type: "purple", done: false });
    tasks.push({ id: "sm_ig_sa", text: "Instagram Post veröffentlichen",
      time: "10:00 Uhr", note: "Vorausgedacht · Zielgruppe 40–60 & 55–65", type: "purple", done: false });
  }
  if (day === 0) tasks.push({
    id: "sm_ig_so", text: "Instagram Post veröffentlichen (optional)",
    note: "Vorausgedacht · nur wenn Inhalt passt", type: "purple", done: false
  });
  if (day === 1 || day === 5) tasks.push({
    id: "sm_story", text: "Instagram Story posten",
    time: "08:00–09:00 oder 20:00 Uhr", note: "Vorausgedacht · flexibel",
    type: "purple", done: false
  });

  return tasks;
}

// ============================================================
// AUFGABEN — wird von Claude täglich aktualisiert
// ============================================================
const TASKS = {
  fixed: [
    {
      id: "f1",
      text: "Vermögensaufbau Fortgeschrittene",
      time: "10:00 Uhr",
      type: "pink",
      done: false
    },
    {
      id: "f2",
      text: "Investment Navigator 360 – Live",
      time: "11:00 Uhr",
      type: "pink",
      done: false
    },
    {
      id: "f3",
      text: "Mittagessen bei Mama · Handwerker beaufsichtigen",
      time: "13:00 Uhr",
      note: "Bücher zur Bücherei auf dem Hinweg abgeben!",
      type: "pink",
      done: false
    },
    {
      id: "f4",
      text: "VHS: Kosten- und Leistungsrechnung",
      time: "18:00 Uhr",
      type: "pink",
      done: false
    },
    {
      id: "f5",
      text: "VHS: Einstieg Finanzbuchhaltung",
      time: "20:00 Uhr",
      type: "pink",
      done: false
    }
  ],
  required: [
    {
      id: "r1",
      text: "Alter Finanzkurs — Block 1",
      time: "Zwischen 12:00 und 13:00 Uhr · ~45 min",
      badge: { text: "bis 12. Mai", type: "red" },
      type: "red",
      done: false
    },
    {
      id: "r2",
      text: "Social-Media-Posts posten",
      note: "Erste Posts heute veröffentlichen",
      type: "gray",
      done: false
    }
  ],
  filler: [
    {
      id: "l1",
      text: "Cap Trader — Konto eröffnen",
      note: "Online-Antrag · ~30 min",
      type: "teal",
      done: false
    },
    {
      id: "l2",
      text: "Anthropic Academy — Claude 101 starten",
      note: "Zwischen Rückkehr von Mama und VHS · ~1h",
      type: "blue",
      done: false
    }
  ]
};

// ============================================================
// DATUM & UHRZEIT
// ============================================================
const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('time-display').textContent = `${h}:${m}`;

  const day = DAYS[now.getDay()];
  const date = now.getDate();
  const month = MONTHS[now.getMonth()];
  const year = now.getFullYear();
  document.getElementById('date-display').textContent = `${day}, ${date}. ${month} ${year}`;

  const hour = now.getHours();
  let greeting = '';
  if (hour < 10) greeting = 'Guter Start in den Tag 🌤';
  else if (hour < 13) greeting = 'Schöner Vormittag ☀️';
  else if (hour < 17) greeting = 'Guter Nachmittag 🌿';
  else if (hour < 20) greeting = 'Schöner Abend 🌇';
  else greeting = 'Gute Nacht bald 🌙';
  document.getElementById('greeting').textContent = greeting;
}

updateClock();
setInterval(updateClock, 30000);

// ============================================================
// DOT COLORS
// ============================================================
const DOT_COLORS = {
  pink: '#EC4899',
  red: '#EF4444',
  amber: '#F59E0B',
  teal: '#14B8A6',
  blue: '#3B82F6',
  purple: '#8B5CF6',
  gray: '#A8A29E'
};

// ============================================================
// STORAGE
// ============================================================
function getStoredDone() {
  try {
    const stored = localStorage.getItem('caroline_done');
    return stored ? JSON.parse(stored) : {};
  } catch(e) { return {}; }
}

function setStoredDone(done) {
  try { localStorage.setItem('caroline_done', JSON.stringify(done)); } catch(e) {}
}

// Reset done state daily
function getTodayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
}

let doneState = {};
const stored = getStoredDone();
if (stored.date === getTodayKey()) {
  doneState = stored.done || {};
} else {
  doneState = {};
}

function saveDone() {
  setStoredDone({ date: getTodayKey(), done: doneState });
}

// ============================================================
// DRAG & DROP
// ============================================================
let dragSrc = null;
let dragSection = null;

function addDragEvents(card, section) {
  card.draggable = true;

  card.addEventListener('dragstart', e => {
    dragSrc = card;
    dragSection = section;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  });

  card.addEventListener('dragover', e => {
    e.preventDefault();
    if (dragSrc && dragSrc !== card && dragSection === section) {
      card.classList.add('drag-over');
    }
    e.dataTransfer.dropEffect = 'move';
  });

  card.addEventListener('dragleave', () => {
    card.classList.remove('drag-over');
  });

  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (dragSrc && dragSrc !== card && dragSection === section) {
      const list = card.parentNode;
      const cards = [...list.querySelectorAll('.task-card')];
      const srcIdx = cards.indexOf(dragSrc);
      const tgtIdx = cards.indexOf(card);
      if (srcIdx < tgtIdx) {
        list.insertBefore(dragSrc, card.nextSibling);
      } else {
        list.insertBefore(dragSrc, card);
      }
    }
  });
}

// ============================================================
// RENDER
// ============================================================
function renderTask(task, section) {
  const card = document.createElement('div');
  card.className = 'task-card' + (doneState[task.id] ? ' done-card' : '');
  card.dataset.id = task.id;

  const dot = document.createElement('div');
  dot.className = 'type-dot';
  dot.style.background = DOT_COLORS[task.type] || DOT_COLORS.gray;

  const content = document.createElement('div');
  content.className = 'task-content';

  const textEl = document.createElement('div');
  textEl.className = 'task-text';
  textEl.textContent = task.text;

  if (task.badge) {
    const badge = document.createElement('span');
    badge.className = `badge badge-${task.badge.type}`;
    badge.textContent = task.badge.text;
    textEl.appendChild(badge);
  }

  content.appendChild(textEl);

  if (task.time) {
    const timeEl = document.createElement('div');
    timeEl.className = 'task-time';
    timeEl.textContent = task.time;
    content.appendChild(timeEl);
  }

  if (task.note) {
    const noteEl = document.createElement('div');
    noteEl.className = 'task-note';
    noteEl.textContent = '→ ' + task.note;
    content.appendChild(noteEl);
  }

  // Done button
  const actions = document.createElement('div');
  actions.className = 'task-actions';

  const btnDone = document.createElement('button');
  btnDone.className = 'btn-done';
  btnDone.title = doneState[task.id] ? 'Als offen markieren' : 'Als erledigt markieren';
  btnDone.innerHTML = doneState[task.id] ? '✓' : '';
  btnDone.addEventListener('click', (e) => {
    e.stopPropagation();
    doneState[task.id] = !doneState[task.id];
    saveDone();
    renderAll();
  });

  actions.appendChild(btnDone);

  // Drag handle
  const handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.innerHTML = '<span></span><span></span><span></span>';

  card.appendChild(dot);
  card.appendChild(content);
  card.appendChild(actions);
  card.appendChild(handle);

  addDragEvents(card, section);
  return card;
}

function renderSection(tasks, listId, countId) {
  const list = document.getElementById(listId);
  const countEl = document.getElementById(countId);
  list.innerHTML = '';

  if (!tasks || tasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'Keine Aufgaben für heute';
    list.appendChild(empty);
    countEl.textContent = '';
    return;
  }

  const done = tasks.filter(t => doneState[t.id]).length;
  countEl.textContent = `${done}/${tasks.length}`;

  tasks.forEach(task => {
    list.appendChild(renderTask(task, listId));
  });
}

function updateProgress() {
  const all = [...TASKS.fixed, ...TASKS.required, ...TASKS.filler];
  const total = all.length;
  const done = all.filter(t => doneState[t.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} von ${total} Aufgaben erledigt`;
}

function renderAll() {
  const socialTasks = getSocialMediaTasks();
  const allFiller = [...TASKS.filler, ...socialTasks];
  renderSection(TASKS.fixed, 'list-fixed', 'count-fixed');
  renderSection(TASKS.required, 'list-required', 'count-required');
  renderSection(allFiller, 'list-filler', 'count-filler');

  // Progress über alle Aufgaben inkl. Social
  const all = [...TASKS.fixed, ...TASKS.required, ...allFiller];
  const total = all.length;
  const done = all.filter(t => doneState[t.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} von ${total} Aufgaben erledigt`;
}

renderAll();
</script>
</body>
</html>
